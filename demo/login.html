<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 -Sub Next</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo"><span>CS</span>Sub Next</a>
      <div class="auth-title">欢迎回来</div>

      <form style="display:flex;flex-direction:column;gap:14px">
        <div>
          <label>账号（邮箱或用户名）</label>
          <input type="text" placeholder="your@email.com" value="demo@example.com" />
        </div>
        <div>
          <label>密码</label>
          <input type="password" placeholder="输入密码" value="strong-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="margin-top:4px">
          登录
        </button>
      </form>

      <div class="auth-footer">
        还没有账号？<a href="register.html">立即注册</a>
      </div>
    </div>
  </div>
</body>
</html>
